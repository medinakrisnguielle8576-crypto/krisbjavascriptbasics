<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="">JavaScript Fun Facts Quiz</h1>
    <p id="intro-text">Lets test your knowledge from what youve learned this far</p>
    
   
    <div id="quizContainer">
        <div id="questionText"></div>
        <div id="optionContainer"class="buttons"></div>

        <button id="nextBtn" class="disable">Next Question</button>
    </div>
   
    <div id="scoreBox"  style="display:none;">
        <h3>Your Score</h3>
        <div id=displayScore></div>
        <button id="restartBtn" class="hide">Restart Quiz</button>
    </div>
   
    <script src="myscript.js"></script>
</body>
</html>
